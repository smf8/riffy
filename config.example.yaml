riffy:
  service-name: "my-service"

proxy:
  port: 8880
  allow-http-side-effects: false

# Analysis pipeline tuning. Optional — omit to use the defaults shown.
pipeline:
  # Bounded capacity of the proxy → analysis-consumer channel. When the
  # consumer falls behind, the newest message is dropped with a warning
  # (backpressure by shedding, never unbounded queueing).
  channel-capacity: 1024

upstream:
  baseline: "localhost:9100"
  control: "localhost:9200"
  candidate: "localhost:9000"
  protocol: http
  timeout: 30s

endpoints:
  - pattern: "/api/v1/users/:id"
  - pattern: "/api/v1/orders/:order_id/items/:item_id"
  - pattern: "/api/v1/health"

threshold:
  relative: 20.0
  absolute: 0.03

# Redis is optional. Omit this whole section to use the in-memory diff store
# (no persistence across restarts) — useful for local development and tests.
redis:
  uri: "redis://localhost:6379"
  stream-key: "riffy:diffs"
  # How often the in-memory counter buffer is flushed (raw counts only) to the
  # store. Short = near-current reads; the flush is cheap (one pipelined write).
  aggregation-interval: 1s
  aggregation-key-prefix: "riffy:agg"

server:
  address: "0.0.0.0"
  port: 8888

logging:
  level: info

metrics:
  enabled: true
  port: 9090
