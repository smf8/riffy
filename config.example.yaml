proxy:
  allow_http_side_effects: false

# Analysis pipeline tuning. Optional — omit to use the defaults shown.
pipeline:
  # Bounded capacity of the proxy → analysis_consumer channel. When the
  # consumer falls behind, the newest message is dropped with a warning
  # (backpressure by shedding, never unbounded queueing).
  channel_capacity: 1024

upstream:
  # The scheme is derived from the address; omit it to default to http://.
  baseline: "http://localhost:9100"
  control: "http://localhost:9200"
  candidate: "http://localhost:9000"
  timeout: 30s

# Each endpoint may carry its own thresholds, suppress_paths, and sample_rate.
# Omit `threshold` for the diffy defaults (relative 20%, absolute 0.03%).
#
# suppress_paths: dot-separated JSON paths to exclude from diff analysis.
#   Two match modes:
#   - Plain path (no *): suppresses the path and all its descendants.
#       "meta"       → suppresses meta, meta.ts, meta.nested.v, …
#   - Glob path (contains *): * matches exactly one dot-separated segment;
#     path depth must equal the pattern depth.
#       "meta.*"     → suppresses meta.ts, meta.v  (direct children only)
#       "items.*.id" → suppresses items.0.id, items.1.id, … (not items.0.name)
#
# sample_rate: fraction of requests to analyze (0.0–1.0, default 1.0).
#   Sampled-out requests are still proxied (baseline only); candidate/control
#   fan-out and analysis are skipped. Use this to reduce upstream load on
#   high-traffic endpoints.
#
# capture_request_curl: store the originating request as a replayable curl
#   command on each diff entry (default false). Persists request headers/body to
#   storage, so it is opt-in per endpoint. The stored curl uses a $RIFFY_TARGET
#   placeholder host; the dashboard substitutes baseline/candidate/control.
# store_credentials_header: store credential header values verbatim (default
#   false). When false, credential headers (authorization, cookie,
#   proxy-authorization, x-api-key, x-auth-token) are listed but their values
#   are redacted. Only meaningful when capture_request_curl is true.
endpoints:
  - pattern: "/api/v1/users/:id"
    threshold:
      relative: 20.0
      absolute: 0.03
    suppress_paths:
      - "updated_at"     # plain: suppresses updated_at and any descendants
      - "meta.*"         # glob:  suppresses all direct children of meta
      - "items.*.ts"     # glob:  suppresses the ts field in each items element
    sample_rate: 0.5     # analyze 50% of requests
    capture_request_curl: true       # store a replayable curl per diff
    store_credentials_header: false  # redact auth/cookie values (default)
  - pattern: "/api/v1/orders/:order-id/items/:item_id"
  - pattern: "/api/v1/health"

# Storage for diffs and aggregation snapshots. `aggregation_interval` and
# `stream_cap` apply to every backend; `backend` chooses where data lands.
storage:
  # How often the in_memory counter buffer is flushed (raw counts only) to the
  # store. Short = near_current reads; the flush is cheap (one pipelined write).
  aggregation_interval: 1s
  # Max per_request diff samples kept in the diff stream; oldest are trimmed
  # past this (Redis XADD MAXLEN ~, in_memory drops the front).
  stream_cap: 10000
  backend:
    # type: in_memory   # no persistence across restarts (default)
    type: redis
    uri: "redis://localhost:6379"

server:
  address: "0.0.0.0"
  proxy_port: 7677
  admin_port: 7678

logging:
  level: debug

# Jaeger trace export via OTLP/HTTP. Disabled by default.
# When enabled, spans are exported to the Jaeger collector's OTLP receiver (port 4318).
jaeger:
  enabled: false
  endpoint: "http://localhost:4318"
  # Fraction of traces to sample: 1.0 = all, 0.5 = half, 0.0 = none.
  # Uses ParentBased(TraceIdRatioBased) — child spans follow the parent's decision.
  sampling_rate: 1.0

metrics:
  enabled: true
  port: 9090
