version: "3.1"
services:
  redis:
    image: 'bitnami/redis:latest'
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_AOF_ENABLED=no
    #    networks:
    #      - redis
    ports:
      - '6379:6379'
  #    volumes:
  #      - "./testdata/dump.rdb:/bitnami/redis/data/dump.rdb"
  redis-slave:
    image: 'bitnami/redis:latest'
    environment:
      - REDIS_REPLICATION_MODE=slave
      - REDIS_MASTER_HOST=redis
      - REDIS_AOF_ENABLED=no
      - ALLOW_EMPTY_PASSWORD=yes
    ports:
      - '6379'
    depends_on:
      - redis
  #    networks:
  #      - redis
  redis-sentinel:
    image: 'bitnami/redis-sentinel:latest'
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    depends_on:
      - redis
      - redis-slave
    ports:
      - '26379:26379'

  jaeger:
    image: jaegertracing/jaeger:latest
    restart: unless-stopped
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP — riffy's exporter targets this (logging.otlp.endpoint)
    environment:
      - COLLECTOR_OTLP_ENABLED=true
