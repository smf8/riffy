<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Riffy — diff dashboard</title>
  <script defer src="/alpine.js"></script>
  <style>
    :root { --bg:#0f1115; --panel:#171a21; --line:#262b36; --fg:#d7dce5; --muted:#8b94a7;
            --accent:#5b9dff; --bad:#ff5b6e; --ok:#34d17b; }
    * { box-sizing: border-box; }
    body { margin:0; font:14px/1.5 system-ui, sans-serif; background:var(--bg); color:var(--fg); }
    header { display:flex; align-items:baseline; gap:.6rem; padding:.8rem 1.1rem; border-bottom:1px solid var(--line); }
    header h1 { margin:0; font-size:1.1rem; }
    header span { color:var(--muted); }
    .error { margin:.6rem 1.1rem; padding:.5rem .7rem; background:#3a1620; color:var(--bad); border-radius:6px; }
    main { display:grid; grid-template-columns: 320px 220px 1fr; gap:1px; background:var(--line);
           min-height: calc(100vh - 53px); }
    section { background:var(--bg); padding:.9rem 1.1rem; overflow:auto; }
    h2 { font-size:.95rem; margin:.1rem 0 .7rem; }
    h3 { font-size:.85rem; color:var(--muted); margin:1.1rem 0 .4rem; text-transform:uppercase; letter-spacing:.04em; }
    ul { list-style:none; margin:0; padding:0; }
    .endpoints li { display:flex; align-items:center; gap:.5rem; padding:.35rem .4rem; border-radius:6px; }
    .endpoints li.active, .endpoints li:hover { background:var(--panel); }
    .endpoints .ep { flex:1; cursor:pointer; word-break:break-all; }
    .endpoints .total { color:var(--muted); font-variant-numeric:tabular-nums; }
    .paths li { padding:.3rem .4rem; border-radius:6px; cursor:pointer; word-break:break-all; }
    .paths li:hover { background:var(--panel); }
    button { font:inherit; color:var(--fg); background:var(--panel); border:1px solid var(--line);
             border-radius:6px; padding:.2rem .55rem; cursor:pointer; }
    button:hover:not(:disabled) { border-color:var(--accent); }
    button:disabled { opacity:.4; cursor:default; }
    button.reset { color:var(--bad); border-color:transparent; padding:.15rem .45rem; }
    .toolbar { margin-bottom:.7rem; }
    table { border-collapse:collapse; width:100%; }
    th, td { text-align:left; padding:.35rem .5rem; border-bottom:1px solid var(--line); vertical-align:top; }
    table.stats th { color:var(--muted); width:9rem; font-weight:500; }
    td { font-variant-numeric:tabular-nums; word-break:break-word; }
    td.ts { white-space:nowrap; color:var(--muted); }
    .badge { font-size:.72rem; padding:.1rem .45rem; border-radius:999px; margin-left:.5rem; }
    .badge.bad { background:#3a1620; color:var(--bad); }
    .badge.ok  { background:#11321f; color:var(--ok); }
    .dtype { display:inline-block; font-size:.68rem; padding:.05rem .4rem; border-radius:999px;
             background:var(--line); color:var(--muted); margin-right:.5rem; text-transform:uppercase;
             letter-spacing:.03em; white-space:nowrap; }
    .pager { display:flex; align-items:center; gap:.8rem; margin-top:.7rem; }
    .muted { color:var(--muted); }
    .target-bar { display:flex; align-items:center; gap:.5rem; margin:1.1rem 0 .4rem; }
    .target-bar select { font:inherit; color:var(--fg); background:var(--panel);
                         border:1px solid var(--line); border-radius:6px; padding:.2rem .4rem; }
    .curl-actions { display:flex; gap:.4rem; align-items:center; }
    pre.curl { margin:.4rem 0 0; padding:.5rem .6rem; background:var(--panel); border:1px solid var(--line);
               border-radius:6px; white-space:pre-wrap; word-break:break-all; font-size:.78rem;
               font-family:ui-monospace, SFMono-Regular, Menlo, monospace; }
  </style>
</head>
<body>
  <div x-data="diffs">
    <header>
      <h1>Riffy</h1><span>diff dashboard</span>
    </header>
    <p class="error" x-show="error" x-text="error" x-cloak></p>
    <main>
      <section class="endpoints">
        <div class="toolbar">
          <button @click="loadEndpoints()">↻ refresh</button>
        </div>
        <h2>Endpoints</h2>
        <ul>
          <template x-for="ep in endpoints" :key="ep.endpoint">
            <li :class="{ active: selected && selected.endpoint === ep.endpoint }">
              <span class="ep" @click="select(ep)" x-text="ep.endpoint"></span>
              <span class="total" x-text="ep.total"></span>
              <button class="reset" title="clear statistics" @click="reset(ep.endpoint)">✕</button>
            </li>
          </template>
        </ul>
        <p class="muted" x-show="endpoints.length === 0">No diffs recorded yet.</p>
      </section>

      <section class="paths" x-show="selected" x-cloak>
        <h2 x-text="selected && selected.endpoint"></h2>
        <ul>
          <template x-for="p in (selected ? selected.paths : [])" :key="p">
            <li :class="{ active: p === path }" @click="showDetail(p)" x-text="p"></li>
          </template>
        </ul>
        <p class="muted" x-show="selected && selected.paths.length === 0">No diffing fields.</p>
      </section>

      <section class="detail" x-show="detail" x-cloak>
        <template x-if="detail">
          <div>
            <h2>
              <span x-text="detail.path"></span>
              <span class="badge" :class="detail.is_regression ? 'bad' : 'ok'"
                    x-text="detail.is_regression ? 'REGRESSION' : 'ok'"></span>
            </h2>
            <table class="stats">
              <tr><th>total requests</th><td x-text="detail.total"></td></tr>
              <tr><th>raw count</th><td x-text="detail.raw_count"></td></tr>
              <tr><th>noise count</th><td x-text="detail.noise_count"></td></tr>
              <tr><th>relative diff</th><td x-text="detail.relative_difference.toFixed(2) + ' %'"></td></tr>
              <tr><th>absolute diff</th><td x-text="detail.absolute_difference.toFixed(2) + ' %'"></td></tr>
              <tr><th>last updated</th><td x-text="detail.last_updated || '—'"></td></tr>
            </table>

            <h3>Samples</h3>
            <div class="target-bar">
              <span class="muted">replay target</span>
              <select x-model="target">
                <option value="baseline">baseline</option>
                <option value="candidate">candidate</option>
                <option value="control">control</option>
              </select>
              <span class="muted" x-text="upstreams[target] || '$RIFFY_TARGET'"></span>
            </div>
            <table class="samples">
              <thead><tr><th>timestamp</th><th>raw (baseline → candidate)</th><th>noise (baseline → control)</th><th>request</th></tr></thead>
              <tbody>
                <template x-for="(s, i) in detail.samples.items" :key="i">
                  <tr>
                    <td class="ts" x-text="s.timestamp"></td>
                    <td>
                      <template x-if="s.raw">
                        <span><span class="dtype" x-text="dlabel(s.raw)"></span><span x-text="diffValue(s.raw)"></span></span>
                      </template>
                      <template x-if="!s.raw"><span class="muted">—</span></template>
                    </td>
                    <td>
                      <template x-if="s.noise">
                        <span><span class="dtype" x-text="dlabel(s.noise)"></span><span x-text="diffValue(s.noise)"></span></span>
                      </template>
                      <template x-if="!s.noise"><span class="muted">—</span></template>
                    </td>
                    <td>
                      <template x-if="s.request_curl">
                        <div>
                          <div class="curl-actions">
                            <button @click="copyCurl(s)">copy curl</button>
                            <button @click="openCurl = (openCurl === i ? null : i)"
                                    x-text="openCurl === i ? 'hide' : 'show'"></button>
                          </div>
                          <pre class="curl" x-show="openCurl === i" x-text="curlFor(s)" x-cloak></pre>
                        </div>
                      </template>
                      <template x-if="!s.request_curl"><span class="muted">—</span></template>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
            <p class="muted" x-show="detail.samples.items.length === 0 && detail.samples.offset === 0">
              No samples recorded for this field.
            </p>

            <div class="pager" x-show="detail.samples.items.length > 0 || detail.samples.offset > 0">
              <button @click="prevPage()" :disabled="detail.samples.offset === 0">‹ prev</button>
              <span class="muted" x-text="pageLabel()"></span>
              <button @click="nextPage()" :disabled="!detail.samples.has_more">next ›</button>
            </div>
          </div>
        </template>
      </section>
    </main>
  </div>

  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('diffs', () => ({
        endpoints: [],
        selected: null,
        path: null,
        detail: null,
        limit: 20,
        offset: 0,
        error: '',
        upstreams: {},
        target: 'candidate',
        openCurl: null,

        async init() { await this.loadEndpoints(); await this.loadUpstreams(); },

        async loadUpstreams() {
          try {
            const r = await fetch('/upstreams');
            if (r.ok) this.upstreams = await r.json();
          } catch (e) { /* placeholder host stays in the curl if this fails */ }
        },

        async loadEndpoints() {
          this.error = '';
          try {
            const r = await fetch('/diffs/paths');
            if (!r.ok) throw new Error('GET /diffs/paths → ' + r.status);
            this.endpoints = (await r.json()).endpoints || [];
            // Keep the current selection/detail in sync with the refreshed data.
            if (this.selected) {
              this.selected = this.endpoints.find(e => e.endpoint === this.selected.endpoint) || null;
              if (!this.selected) { this.path = null; this.detail = null; }
              else if (this.path) { await this.loadDetail(); }
            }
          } catch (e) { this.error = String(e); }
        },

        select(ep) { this.selected = ep; this.path = null; this.detail = null; this.offset = 0; },

        showDetail(path) { this.path = path; this.offset = 0; return this.loadDetail(); },

        async loadDetail() {
          if (!this.selected || !this.path) return;
          this.error = '';
          this.openCurl = null;
          try {
            const u = new URL('/diffs/detail', location.origin);
            u.searchParams.set('endpoint', this.selected.endpoint);
            u.searchParams.set('path', this.path);
            u.searchParams.set('limit', this.limit);
            u.searchParams.set('offset', this.offset);
            const r = await fetch(u);
            if (!r.ok) throw new Error('GET /diffs/detail → ' + r.status);
            this.detail = await r.json();
          } catch (e) { this.error = String(e); }
        },

        nextPage() {
          if (this.detail && this.detail.samples.has_more) {
            this.offset += this.limit;
            return this.loadDetail();
          }
        },

        prevPage() {
          if (this.offset > 0) {
            this.offset = Math.max(0, this.offset - this.limit);
            return this.loadDetail();
          }
        },

        pageLabel() {
          const s = this.detail.samples;
          if (s.items.length === 0) return s.offset > 0 ? 'no more samples' : 'none';
          return 'samples ' + (s.offset + 1) + '–' + (s.offset + s.items.length);
        },

        async reset(endpoint) {
          if (!confirm('Clear all statistics for ' + endpoint + '?')) return;
          this.error = '';
          try {
            const u = new URL('/diffs', location.origin);
            u.searchParams.set('endpoint', endpoint);
            const r = await fetch(u, { method: 'DELETE' });
            if (!r.ok && r.status !== 404) throw new Error('DELETE /diffs → ' + r.status);
            if (this.selected && this.selected.endpoint === endpoint) {
              this.selected = null; this.path = null; this.detail = null;
            }
            await this.loadEndpoints();
          } catch (e) { this.error = String(e); }
        },

        // A field's diff_type as a human label, e.g. "missing_field" → "missing field".
        dlabel(d) { return (d.diff_type || '').replace(/_/g, ' '); },

        // Render the value change by presence: both sides → "a → b"; only one
        // side present (missing/extra field) → that value; neither (ordering)
        // → empty, the badge carries the meaning. A present side that is JSON
        // null renders as "null" (distinct from an absent side).
        diffValue(d) {
          const hasL = Object.prototype.hasOwnProperty.call(d, 'left');
          const hasR = Object.prototype.hasOwnProperty.call(d, 'right');
          if (hasL && hasR) return this.fmt(d.left) + ' → ' + this.fmt(d.right);
          if (hasL) return this.fmt(d.left);
          if (hasR) return this.fmt(d.right);
          return '';
        },

        // JSON.stringify keeps types visible: strings quoted, null as "null",
        // objects/arrays as compact JSON.
        fmt(v) { return JSON.stringify(v); },

        // The stored curl with its $RIFFY_TARGET placeholder replaced by the
        // selected upstream base (or left as the placeholder if unknown).
        curlFor(s) {
          const base = this.upstreams[this.target] || '$RIFFY_TARGET';
          return (s.request_curl || '').split('$RIFFY_TARGET').join(base);
        },

        async copyCurl(s) {
          const text = this.curlFor(s);
          try {
            await navigator.clipboard.writeText(text);
          } catch (e) {
            // No clipboard (insecure context): reveal the command for manual copy.
            this.openCurl = this.detail.samples.items.indexOf(s);
            this.error = 'clipboard unavailable — copy the command manually';
          }
        },
      }));
    });
  </script>
  <style>[x-cloak] { display: none !important; }</style>
</body>
</html>
