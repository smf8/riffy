# Built-in configuration defaults, embedded into the binary via include_str!.
# This is the base layer; config.example.yaml, config.yaml, RIFFY__* env vars,
# and CLI args all override it. Fields with no sensible default (the upstream
# addresses and the endpoint list) are intentionally absent and must be
# supplied by the user.

proxy:
  allow_http_side_effects: false

consumer:
  channel_capacity: 1024

upstream:
  timeout: 30s

storage:
  # Per-endpoint cap on retained raw samples.
  sample_cap: 10000
  # Samples older than `window` are ignored at read time, so the regression
  # verdict reflects recent traffic only.
  window: 60m
  # Decoded upstream bodies larger than this are not stored.
  max_body_bytes: 262144
  backend:
    type: in_memory

server:
  address: "0.0.0.0"
  proxy_port: 7677
  admin_port: 7678

logging:
  level: info

jaeger:
  enabled: false
  endpoint: "http://localhost:4318"
  sampling_rate: 1.0

metrics:
  # Metrics are served on the admin server's /metrics route (server.admin_port).
  enabled: true
