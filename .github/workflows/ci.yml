name: CI

# Pipeline stages (chained via `needs`):
#   lint   -> always (push + PR + tags)
#   build  -> always; on a tag push it also creates/updates the GitHub release
#   docker -> tags only; builds the image and pushes it to GHCR
#
# Only official GitHub tooling is used: actions/checkout, the pre-installed
# `gh` CLI for releases, and the pre-installed `docker` CLI authenticated with
# the built-in GITHUB_TOKEN. No third-party actions.

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: write # create/update GitHub releases (build stage)
  packages: write # push images to GHCR (docker stage)

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: make lint
        run: make lint

  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Compile-correctness gate — runs on every trigger (push, PR, tag).
      - name: make build
        run: make build
      # The rest only runs on a tag push: build the optimized binary and
      # publish it to the matching GitHub release, creating the release if it
      # does not exist yet.
      - name: make build-release
        if: startsWith(github.ref, 'refs/tags/')
        run: make build-release
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            target/release/riffy \
          || gh release upload "$GITHUB_REF_NAME" target/release/riffy --clobber

  docker:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1" # Dockerfile uses the `# syntax=` directive
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and push image
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          docker build -t "$IMAGE:$GITHUB_REF_NAME" -t "$IMAGE:latest" .
          docker push "$IMAGE:$GITHUB_REF_NAME"
          docker push "$IMAGE:latest"
